<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Availability</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Pickleball Buddy</p>
          <h1>Availability</h1>
        </div>
      </header>

      <section class="panel saved-panel" aria-labelledby="savedHeading">
        <div class="section-title">
          <h2 id="savedHeading">Saved results</h2>
          <span id="savedSummary" class="summary-pill">Loading</span>
        </div>
        <p class="section-hint">Tick venues to refresh. Click a venue name to view its saved result.</p>
        <ul id="venueStatusList" class="venue-status-list"></ul>
        <div class="toolbar">
          <button id="refreshVenueButton" type="button">Refresh Selected</button>
          <button
            id="refreshStaleButton"
            type="button"
            class="secondary"
            title="Refresh only venues with missing or stale saved results."
          >
            Refresh Stale
          </button>
        </div>
      </section>

      <section class="panel">
        <label class="target-field" for="venueSelect">
          <span>Saved result</span>
          <select id="venueSelect"></select>
        </label>
        <div id="actions" class="actions" hidden>
          <button id="viewAvailabilityButton" type="button">View Availability</button>
          <button id="copyShareLinkButton" type="button" class="secondary">Copy Share Link</button>
        </div>
        <details class="more-actions">
          <summary>More actions</summary>
          <div class="utility-row">
            <button id="readCurrentPageButton" type="button" class="tertiary">Read current tab</button>
            <button
              id="refreshAllButton"
              type="button"
              class="tertiary"
              title="Refresh all venues. Slow venues may reuse a recent cache to keep this fast."
            >
              Refresh all
            </button>
            <button
              id="deepScanVenueButton"
              type="button"
              class="tertiary"
              title="Same-court scan for venues that support it. Slower than normal refresh."
              hidden
            >
              Deep scan courts
            </button>
          </div>
        </details>

        <div id="loader" class="pickleball-loader" role="status" aria-live="polite" aria-busy="true" hidden>
          <span class="pickleball-loader__paddle" aria-hidden="true">
            <span class="pickleball-loader__paddle-head"></span>
          </span>
          <span class="pickleball-loader__arc" aria-hidden="true"></span>
          <span class="pickleball-loader__ball" aria-hidden="true"></span>
          <span class="pickleball-loader__text">
            Loading<span class="pickleball-loader__dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span>
          </span>
        </div>
        <p id="status" class="status" aria-live="polite">Loading availability...</p>
        <details id="refreshHistory" class="refresh-history" hidden>
          <summary>
            <span id="refreshHistoryHeading">Recent refreshes</span>
            <span id="refreshHistoryCount" class="refresh-history-count"></span>
          </summary>
          <ul id="refreshHistoryList"></ul>
        </details>
      </section>
    </main>

    <script src="venues.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
