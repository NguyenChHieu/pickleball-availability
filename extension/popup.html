<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Availability</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Pickleball Buddy</p>
          <h1>Availability</h1>
        </div>
        <select id="venueSelect" aria-label="Venue"></select>
      </header>

      <section class="panel">
        <div class="toolbar">
          <button id="refreshVenueButton" type="button">Refresh Venue</button>
          <button id="readCurrentPageButton" type="button" class="secondary">Read Current Page</button>
          <button id="deepScanVenueButton" type="button" class="secondary" hidden>Deep Scan Courts</button>
        </div>

        <p id="status" class="status" aria-live="polite">Loading availability...</p>
      </section>

      <div id="actions" class="actions" hidden>
        <button id="viewAvailabilityButton" type="button">View Availability</button>
        <button id="copyShareLinkButton" type="button" class="secondary">Copy Share Link</button>
      </div>
    </main>

    <script src="venues.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
